<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Grid</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <!-- Header -->
    <div class="row">
        <div class="col-12 bg-primary text-center py-4 rounded-4">
            <h1>Header</h1>
        </div>
    </div>

    <!-- Three Columns -->
    <div class="row mt-3 gx-4">

        <!-- Column 1 -->
        <div class="col-4">
            <div class="bg-success text-center py-5 rounded-5">
                <br><br><br>
                <h2>Column 1</h2>
                <br><br><br>
            </div>
        </div>

        <!-- Column 2 -->
        <div class="col-4">
            <div class="text-center py-5 rounded-5"
                 style="background-color: orange;">
                <br><br><br>
                <h2>Column 2</h2>
                <br><br><br>
            </div>
        </div>

        <!-- Column 3 -->
        <div class="col-4">
            <div class="bg-warning text-center py-5 rounded-5">
                <br><br><br>
                <h2>Column 3</h2>
                <br><br><br>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <div class="row mt-3">
        <div class="col-12 bg-info text-center rounded-3">
            <h2>Footer</h2>
        </div>
    </div>

</div>

</body>
</html>
