<!DOCTYPE html>
<html>
<head>
    <title>Time Table</title>

    <style>
        table {
            width: 800px;
            border-collapse: collapse;
        }

        th, td {
            border: 3px double black;
            padding: 10px;
        }

        th {
            text-align: center;
        }
    </style>
</head>

<body>

<table>

    <tr>
        <th colspan="6">Time Table</th>
    </tr>

    <tr>
        <th rowspan="7">Hours</th>
        <th>Mon</th>
        <th>Tue</th>
        <th>Wed</th>
        <th>Thu</th>
        <th>Fri</th>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td>Arts</td>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td>Arts</td>
    </tr>

    <tr>
        <th colspan="5">LUNCH</th>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td rowspan="2">Project</td>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
    </tr>

</table>

</body>
</html>
