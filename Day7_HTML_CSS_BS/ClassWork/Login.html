<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login Page</title>

<link rel="stylesheet" href="LoginStyle1.css">
</link>
</head>
<body>
	<div>

		<table class="LoginDiv">
			<tr>
				<td>Username</td>
				<td>:</td>
				<td><input type="text"></td>
			</tr>

			<tr>
				<td>Password</td>
				<td>:</td>
				<td><input type="password"></td>
			</tr>

			<tr>
				<td colspan="3" align="center"><input type="submit"
					value="Login" class = "LoginButton"></td>
			</tr>
		</table>
	</div>
</body>
</html>
